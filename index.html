<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Poirot - O Assassinato</title>
</head>
<body>

    <header>
        <h1>O Assassinato em Thornfield Manor</h1>
    </header>
    
    <main>
        <!-- Painel esquerdo: onde o texto do jogo aparece -->
        <section id="narrativa">
            <div id="texto-cena"></div>
        </section>

        <!-- Painel direito: controles do jogo -->
         <aside id="sidebar">
            <div id="suspeitos">
                 <!-- Botões dos suspeitos vêm aqui -->
            </div>
            <ul id="pistas"></ul>
            <button id="btn-acusar">Acusar o culpado</button>

         </aside>

    </main>

    <!-- Área de digitação do jogador -->
     <div id="area-input">
        <textarea id="input-jogador" placeholder="Faça uma pergunta..."></textarea>
        <button id="btn-enviar">Enviar</button>
     </div>


     <script>
        // ─── ESTADO CENTRAL DO JOGO ───────────────────────────────
        const JOGO = {
            fase: 'intro', // 'intro' | 'investigacao' | 'acusacao' | 'encerrado'
            suspeitoAtual: null, // qual suspeito está sendo interrogado agora
            interrogados: new Set(), // quais já foram interrogados (Set evita duplicatas)
            pistas: [], // array de strings com as pistas coletadas
            historicos: {}, // { id_suspeito: [mensagens...] } — memória por suspeito
};
        // ─── DADOS DOS SUSPEITOS ──────────────────────────────────
// A estrutura: informações visíveis ao jogador + segredos só para a IA

const SUSPEITOS = {
    lord_ashworth: {
        nome: 'Lord Ashworth',
        papel: 'irmão da vítima',
        descrição: 'Homem de meia-idade, mãos trêmulas. Herdará a propriedade.',
        segredos: 'Tinha dívidas de jogo. Alibi fraco — diz que estava no quarto.',
        culpado: false,
        
    },
    lady_victoria: {
        nome: 'Lady victoria',
        papel: 'esposa da vítima',
        descrição: 'Elegante e fria. Usava luvas dentro de casa.',
        segredos: 'Tinha um caso com o Dr. Pemberton. Sabia que o marido mudaria o testamento.',
        culpado: false,
    },
    dr_pemberton: {
        nome: 'Dr. Pemberton',
        papel: 'médico da família',
        descrição: 'Culto, voz suave. Conhece a casa há anos.',
        // Segredo completo — só a IA sabe:
        segredos: 'CULPADO. Envenenou Sir Edmund com arsênico no conhaque. Sir Edmund descobrira o caso com Lady Victoria e ameaçava expô-lo.',
        culpado: true,
    },
    miss_crane: {
    nome: 'Miss Crane',
    papel: 'Secretária particular',
    descricao: 'Jovem nervosa, dedos manchados de tinta.',
    segredos: 'Descobriu que Sir Edmund forjava documentos. Estava no jardim na hora do crime.',
    culpado: false,
  },
  mordomo_graves: {
    nome: 'Graves, o Mordomo',
    papel: 'Mordomo-chefe',
    descricao: 'Impassível. Serve à família há 30 anos.',
    segredos: 'Serviu o conhaque sem saber que estava envenenado. Protege Lady Victoria por lealdade.',
    culpado: false,
  },
};

// A verdade oculta do caso:
const VERDADE = {
    assassino: 'dr_pemberton',
    metodo: 'arsênico dissolvido no conhaque',
    motivo: 'Sir Edmund descobrira o caso com Lady Victoria',
};

// ─── REFERÊNCIAS AO DOM ──────────────────────────────────
const $texto = document.getElementById('texto-cena');
const $input = document.getElementById('input-jogador');
const $enviar = document.getElementById('btn-enviar');
const $acusar = document.getElementById('btn-acusar');
const $pistas = document.getElementById('pistas');
const $suspeitos = document.getElementById('suspeitos');

// ─── CRIAR BOTÕES DOS SUSPEITOS ─────────────────────────
// Para cada suspeito nos dados, cria um botão automaticamente

function criarBotoesSuspeitos() {
    object.entries(SUSPEITOS).forEach(([id, s]) => {
        const btn = document.createElement('button');
       btn.textContent = s.nome;
       btn.dataset.id = id;                  // guarda o ID no atributo do botão
       btn.className = 'btn-suspeito';

       btn.addEventListener('click', () => {
           if (JOGO.fase !== 'investigacao') return;
           selecionarSuspeito(id);
       });

       $suspeitos.appendChild(btn);
    });}

    // ─── SELECIONAR UM SUSPEITO ──────────────────────────────
function selecionarSuspeito(id){
    JOGO.suspeitoAtual = id;
    const s = SUSPEITOS[id];

      // Inicializa o histórico desse suspeito se não existir
    if (!JOGO.historicos[id]){
        JOGO.historicos[id] = [];
    }

      // Marca o botão como ativo visualmente
    document.querySelectorAll('.btn-suspeito').forEach(b =>{ 
        b.classList.toggle('ativo', b.dataset.id === id);
    });

    // Escreve a introdução do personagem na tela
    adicionarNarrador('Poirot se aproxima de ${s.nome} (${s.papel}). ${s.descricao}');

}

// ─── FUNÇÕES DE RENDERIZAÇÃO DE TEXTO ───────────────────
// Cada função cria um parágrafo com estilo diferente

function adicionarTexto(html){
    const p = document.createElement('p');
    p.innerHTML = html;
    $texto.appendChild(p);
    $texto.parentElement.scrollTop = $texto.parentElement.scrollHeight; // rola para baixo
}

function adicionarNarrador(texto){
    adicionarTexto('<em class="narrador">${escaparHtml(texto)}</em>');
}

function adicionarPoirot(texto){
    adicionarTexto('<strong class="falante">Poirot:</strong> <span class="fala">"&{escaparHtml(texto)}"</span>');
}

function adicionarSuspeito(nome, texto){
    adicionarTexto('<strong class="falante">${escaparHtml(nome)}:</strong> "${escaparHtml(texto)}"');
}

function adicionarJogador(texto){
    adicionarTexto('<span class="jogador">Você: ${escaparHtml(texto)}</span>');
}

// Escapar HTML evita que texto do usuário seja interpretado como código
function escaparHtml(str){
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

// ─── ADICIONAR PISTA ─────────────────────────────────────
function adicionarPista(suspeito, texto){
    const pista = '${suspeito}: ${texto}';
    if (JOGO.pistas.includes(pista)) return; // evita pistas duplicadas

    JOGO.pistas.push(pista);

    const li = document.createElement('li');
    li.textContent = pista;
    $pistas.appendChild(li);
}

// chamar na inicialização do jogo para criar os botões dos suspeitos
criarBotoesSuspeitos();

// ─── CHAMADA À API ───────────────────────────────────────

  // sem travar o restante do código

  const resposta = await fetch('https://api.anthropic.com/v1/messages',{
    method: 'POST',
    headers: { 'Content-Type': 'application/json'},
    

  })
}


</script>
    
</body>
</html>
